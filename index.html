<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울고용센터 청년 ON-AIR 웹진 아카이브</title>
    <!-- React, ReactDOM, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #FAF8F2; /* 따뜻한 상아색 배경 */
            color: #334155;
            overflow-x: hidden; 
        }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes subtle-twinkle { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.02); text-shadow: 0 0 10px rgba(79, 70, 229, 0.2); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-subtle-twinkle { animation: subtle-twinkle 2s ease-in-out infinite; }
        .animate-bounce-slow { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        [data-lucide] { display: inline-block; vertical-align: middle; line-height: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "", size = 20 }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const WEBZINE_DATA = [
            {
                id: 1, month: "3", title: "Start: 다시 피어나는 청년", issue: "Vol. 1",
                status: "published", thumbnail: "300.png",
                description: "3-4월 주요 프로그램 후기부터 생생한 참여자 인터뷰까지, 청년들의 도약을 담은 알찬 콘텐츠를 만나보세요!",
                cardBg: "bg-white shadow-2xl", // 3월호는 흰색 바탕에 강한 그림자로 툭 튀어나오게
                accent: "text-indigo-600",
                border: "border-indigo-400", // 테두리 강조
                headerBg: "bg-indigo-50"
            },
            {
                id: 2, month: "5", title: "준비 중입니다", issue: "Vol. 2",
                status: "upcoming", thumbnail: "100.png",
                description: "5월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-50/50", // 연한 회색 처리
                accent: "text-slate-400",
                border: "border-slate-200",
                headerBg: "bg-transparent"
            },
            {
                id: 3, month: "7", title: "준비 중입니다", issue: "Vol. 3",
                status: "upcoming", thumbnail: "100.png",
                description: "7월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-50/50",
                accent: "text-slate-400",
                border: "border-slate-200",
                headerBg: "bg-transparent"
            },
            {
                id: 4, month: "9", title: "준비 중입니다", issue: "Vol. 4",
                status: "upcoming", thumbnail: "100.png",
                description: "9월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-50/50",
                accent: "text-slate-400",
                border: "border-slate-200",
                headerBg: "bg-transparent"
            },
            {
                id: 5, month: "11", title: "준비 중입니다", issue: "Vol. 5",
                status: "upcoming", thumbnail: "100.png",
                description: "11월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-50/50",
                accent: "text-slate-400",
                border: "border-slate-200",
                headerBg: "bg-transparent"
            },
            {
                id: 6, month: "12", title: "준비 중입니다", issue: "Vol. 6",
                status: "upcoming", thumbnail: "100.png",
                description: "12월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-50/50",
                accent: "text-slate-400",
                border: "border-slate-200",
                headerBg: "bg-transparent"
            }
        ];

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");

            const filteredWebzines = WEBZINE_DATA.filter(webzine =>
                webzine.title.includes(searchTerm) || webzine.month.includes(searchTerm)
            );

            return (
                <div className="min-h-screen selection:bg-yellow-200">
                    {/* 상단 띠 배너 */}
                    <div className="bg-indigo-600 text-white py-2 px-4 text-center text-sm font-medium tracking-wider">
                        🚀 서울고용센터와 함께하는 청년들의 무한한 성장판! 
                    </div>

                    {/* HERO SECTION */}
                    <header className="relative overflow-hidden bg-[#FEFCF8] border-b border-orange-100 pt-16 pb-24 md:pt-20 md:pb-36">
                        <div className="absolute top-20 left-[10%] w-32 h-32 bg-yellow-200/30 rounded-full blur-3xl"></div>
                        <div className="max-w-6xl mx-auto px-8 relative z-10 flex flex-col md:flex-row items-center gap-10">
                            <div className="md:w-3/5 text-center md:text-left">
                                <div className="inline-flex items-center gap-2 bg-yellow-400 text-slate-900 px-5 py-2.5 rounded-full mb-8 font-bold shadow-sm transform -rotate-1 border border-yellow-500/20">
                                    <Icon name="smile" size={24} className="text-indigo-700" />
                                    <span className="text-sm md:text-base flex items-center flex-wrap gap-1">
                                        청년의 꿈과 가능성을 연결하는 취업 지원 허브,
                                        <span className="text-indigo-700 text-base md:text-lg animate-subtle-twinkle ml-1 flex items-center border-none">
                                            <Icon name="sparkles" size={16} className="mr-0.5" />
                                            서울고용센터
                                            <Icon name="sparkles" size={16} className="ml-0.5" />
                                        </span>
                                    </span>
                                </div>
                                <h1 className="text-5xl md:text-7xl font-normal text-slate-900 mb-8 leading-[1.2]">
                                    청년 <span className="text-indigo-600 underline decoration-indigo-200 decoration-8 underline-offset-8 italic uppercase">ON-AIR</span><br />
                                    <span className="text-4xl md:text-5xl">웹진 아카이브</span>
                                </h1>
                                <p className="text-slate-600 text-lg md:text-xl max-w-xl leading-relaxed mb-12">
                                    서툰 첫걸음이 단단한 도약이 되기까지,<br />
                                    서울고용센터가 청년들과 함께 일궈낸 소중한 조각들을<br />
                                    <span className="text-indigo-600">'청년ON-AIR'</span>에서 확인하세요. ✨
                                </p>
                                <div className="relative max-w-lg mx-auto md:mx-0 group border-none">
                                    <Icon name="search" size={24} className="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400" />
                                    <input 
                                        type="text" 
                                        placeholder="보고 싶은 월호를 찾아봐요! (예: 3월)"
                                        className="w-full pl-14 pr-8 py-5 bg-white border-4 border-orange-50 rounded-3xl text-lg shadow-lg focus:outline-none focus:border-indigo-400 transition-all placeholder:text-slate-300"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="md:w-2/5 relative">
                                <div className="absolute -top-12 -left-4 bg-white p-4 rounded-2xl shadow-xl border-2 border-orange-50 transform -rotate-12 z-20">
                                    <p className="text-indigo-600 font-bold text-sm text-center">서울고용센터 소식 <br/> 제가 다 들고 왔어요! 🎤</p>
                                </div>
                                <div className="relative z-10 transform hover:rotate-3 transition-transform duration-500 cursor-pointer">
                                    <img src="300.png" alt="리포터" className="w-full h-auto drop-shadow-2xl" />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* CONTENT SECTION - 3월호 강조 & 나머지 회색 처리 */}
                    <main className="max-w-6xl mx-auto px-8 -mt-16 relative z-20 pb-40">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filteredWebzines.map((webzine) => {
                                const isPublished = webzine.status === 'published';
                                return (
                                    <div key={webzine.id} className={`group relative flex flex-col ${webzine.cardBg} rounded-[2.5rem] transition-all duration-500 hover:-translate-y-4 border-4 overflow-hidden ${isPublished ? `border-indigo-400 ring-4 ring-indigo-50 shadow-2xl` : `border-dashed ${webzine.border} opacity-80 shadow-md`}`}>
                                        <div className={`relative h-36 md:h-44 overflow-hidden flex items-center justify-center ${isPublished ? 'bg-indigo-50/50' : 'bg-white/20'} shrink-0 border-none p-4`}>
                                            <img src={webzine.thumbnail} alt={webzine.month} className={`h-full w-auto object-contain transition-transform duration-700 group-hover:scale-110 ${!isPublished ? 'grayscale opacity-60' : ''}`} />
                                            
                                            <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full border border-white/50 z-10 shadow-sm text-slate-800">
                                                <span className="text-sm font-bold">{webzine.issue}</span>
                                            </div>

                                            {isPublished ? (
                                                <div className="absolute -right-4 top-2 bg-yellow-400 text-slate-900 px-6 py-1 rounded-full text-[10px] font-black shadow-lg transform rotate-12 animate-pulse z-10 uppercase">NEW OPEN</div>
                                            ) : (
                                                <div className="absolute bottom-2 right-3 z-20">
                                                    <div className={`bg-white/90 shadow-sm ${webzine.accent} px-2 py-0.5 rounded-lg text-[9px] font-black flex items-center gap-1 border border-white/50`}>
                                                        <Icon name="clock" size={10} />공개 예정
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-8 flex flex-col flex-grow relative">
                                            <Icon name="quote" size={40} className={`absolute top-6 right-6 ${webzine.accent} opacity-10`} />
                                            <div className={`flex items-center gap-2 ${webzine.accent} mb-3 font-bold shrink-0 text-lg md:text-xl tracking-tight`}>
                                                <Icon name="map-pin" size={20} /><span>{webzine.month}월호 웹진</span>
                                            </div>
                                            <h2 className={`text-2xl font-normal mb-4 leading-tight ${isPublished ? 'text-slate-800 group-hover:text-indigo-600' : 'text-slate-400'} transition-colors shrink-0`}>{webzine.title}</h2>
                                            <p className={`${isPublished ? 'text-slate-600' : 'text-slate-400'} leading-relaxed mb-8 flex-grow text-base md:text-lg`}>{webzine.description}</p>
                                            <div className="mt-auto">
                                                {isPublished ? (
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <a href="#" target="_blank" className="flex items-center justify-center gap-2 bg-indigo-600 text-white py-4 rounded-[1.5rem] font-bold text-base hover:bg-slate-900 transition-all shadow-lg border-none"><Icon name="eye" size={18} />보기</a>
                                                        <a href="#" download className="flex items-center justify-center gap-2 border-4 border-indigo-100 text-indigo-600 py-4 rounded-[1.5rem] font-bold text-base hover:bg-white transition-all shadow-sm border-none"><Icon name="download" size={18} />PDF</a>
                                                    </div>
                                                ) : (
                                                    <div className={`w-full bg-slate-100/50 ${webzine.accent} py-4 rounded-[1.8rem] font-bold text-center border-2 border-dashed ${webzine.border} flex items-center justify-center gap-2 text-base cursor-not-allowed`}>
                                                        <Icon name="clock" size={18} />커밍순!
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-[#FAF8F2] border-t-8 border-yellow-400 pt-24 pb-12 overflow-hidden">
                        <div className="max-w-6xl mx-auto px-8 flex flex-col items-center">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl rotate-6 shrink-0 border-none"><Icon name="file-text" size={32} className="text-white" /></div>
                                <div className="text-left"><span className="text-3xl font-normal text-slate-900 block leading-none text-indigo-600 uppercase">서울고용센터 웹진 아카이브</span><span className="text-slate-400 text-sm font-bold tracking-widest uppercase mt-1 block tracking-tighter">Youth On-Air Studio</span></div>
                            </div>
                            <p className="text-slate-500 text-center max-w-lg mb-20 text-lg leading-relaxed">이곳은 서울고용센터와 청년들이 함께 만들어가는 <br/>꿈과 도전의 기록 저장소입니다. 우리의 내일을 응원해요!</p>
                            
                            <div className="flex flex-col md:flex-row items-center justify-center gap-12 w-full max-w-3xl mb-24 px-4">
                                <div className="relative w-40 md:w-48 shrink-0 transform hover:scale-105 transition-transform duration-500">
                                    <div className="absolute -top-20 left-1/2 -translate-x-1/2 bg-white px-5 py-3 rounded-2xl shadow-2xl border-2 border-indigo-50 whitespace-nowrap z-20 animate-bounce-slow">
                                        <p className="text-indigo-600 font-bold text-[11px] md:text-xs text-center leading-snug">청년의 꿈을 이뤄주는 <br/> 서울고용센터에 오세요 ✨</p>
                                        <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-b-2 border-r-2 border-indigo-50 rotate-45"></div>
                                    </div>
                                    <img src="300.png" alt="캐릭터" className="w-full h-auto drop-shadow-xl" />
                                </div>
                                <div className="flex-grow max-w-[280px] w-full">
                                    <div className="bg-white p-2 rounded-[2rem] shadow-sm mb-4 border border-orange-100">
                                        <div className="rounded-[1.5rem] overflow-hidden border-4 border-white shadow-md bg-slate-100 relative h-40 md:h-44">
                                            <iframe title="지도" width="100%" height="100%" frameBorder="0" style={{ border: 0 }} src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.51866415053!2d126.98687797636183!3d37.56641262413551!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2e652a2022b%3A0xe5f9227f67713437!2z7ISc7Jq47Yq567OE7IucIOykkOq1rCDsgrzvOTrj6TrnoQgMzYz!5e0!3m2!1sko!2skr!4v1711514000000!5m2!1sko!2skr" allowFullScreen></iframe>
                                        </div>
                                    </div>
                                    <div className="flex justify-center">
                                        <a href="https://map.naver.com/p/directions/-/3zi2Hl,2AM4KL,%EC%84%9C%EC%9A%B8%EA%B3%A0%EC%9A%A9%EB%B3%B5%EC%A7%80%ED%94%8C%EB%9F%AC%EC%8A%A4%EC%84%BC%ED%84%B0,1845904326,PLACE_POI/-/car?c=15.00,0,0,0,dh" target="_blank" className="group flex items-center gap-2 bg-[#03C75A] text-white px-5 py-2 rounded-xl font-bold text-[12px] shadow-md hover:bg-[#02b351] transition-all transform hover:scale-105 border-none">
                                            <Icon name="navigation" size={14} className="animate-pulse" />
                                            네이버 지도 길찾기
                                        </a>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-wrap justify-center gap-4 mb-16 font-bold">
                                <a href="https://www.work.go.kr/seoul/main.do" target="_blank" className="flex items-center gap-2 px-6 py-2.5 bg-white text-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition-all shadow-sm border border-orange-50 text-xs border-none"><Icon name="globe" size={14} /> 공식 홈페이지</a>
                                <a href="https://www.work24.go.kr/cm/main.do" target="_blank" className="flex items-center gap-2 px-6 py-2.5 bg-white text-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition-all shadow-sm border border-orange-50 text-xs border-none"><Icon name="layout-grid" size={14} /> 고용24</a>
                                <a href="https://www.instagram.com/moel_seoulew/" target="_blank" className="flex items-center gap-2 px-6 py-2.5 bg-white text-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition-all shadow-sm border border-orange-50 text-xs border-none"><Icon name="instagram" size={14} /> 인스타그램</a>
                            </div>

                            <div className="w-full pt-12 border-t border-orange-100 flex flex-col items-center gap-8 border-none">
                                <div className="flex flex-wrap justify-center items-center gap-8 md:gap-16 border-none">
                                    <img src="서울지방고용노동청 로고 (1).png" alt="노동청" className="h-10 w-auto object-contain" />
                                    <img src="서울고용복지플러스센터 bi.png" alt="센터" className="h-10 w-auto object-contain" />
                                </div>
                                <div className="text-slate-400 text-[10px] tracking-[0.2em] font-medium uppercase text-center border-none mt-4">Designed for Seoul Youth @ 2026 Seoul Employment Center <br/> All Rights Reserved.</div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
