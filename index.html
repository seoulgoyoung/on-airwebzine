<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울고용센터 청년 ON-AIR 웹진 아카이브</title>
    <!-- React, ReactDOM, Babel, Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #FAF8F2; 
            color: #334155;
        }
        @keyframes subtle-twinkle { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.02); } }
        .animate-subtle-twinkle { animation: subtle-twinkle 2s ease-in-out infinite; }
        .animate-bounce-slow { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        
        /* 팝업 애니메이션 */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 컴포넌트 (라이브러리 충돌 방지를 위한 인라인 SVG)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                smile: <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22ZM12 17C10.5 17 9 16 8 15M9 10H9.01M15 10H15.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
                sparkles: <g stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"><path d="m12 3 1.912 5.885L20 10.8l-5.885 1.912L12 18.6l-1.912-5.885L4.2 10.8l5.885-1.912z"/><path d="M4 16l1.391 1.609L7 16l-1.609-1.391z"/><path d="M18 16l1.391 1.609L21 16l-1.609-1.391z"/></g>,
                search: <g stroke="currentColor" strokeWidth="2" fill="none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" strokeLinecap="round"/></g>,
                mapPin: <g stroke="currentColor" strokeWidth="2" fill="none"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></g>,
                eye: <g stroke="currentColor" strokeWidth="2" fill="none"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></g>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
                clock: <g stroke="currentColor" strokeWidth="2" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" strokeLinecap="round"/></g>,
                fileText: <g stroke="currentColor" strokeWidth="2" fill="none"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></g>,
                navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" stroke="currentColor" strokeWidth="2" fill="none" strokeLinejoin="round"/>,
                layoutGrid: <g stroke="currentColor" strokeWidth="2" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></g>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" className={className}>{icons[name]}</svg>;
        };

        const WEBZINE_DATA = [
            {
                id: 1, month: "3", title: "Start: 다시 피어나는 청년", issue: "Vol. 1",
                status: "published", thumbnail: "300.png", isComingSoon: true, // 팝업용
                description: "3-4월 주요 프로그램 후기부터 생생한 참여자 인터뷰까지, 청년들의 도약을 담은 알찬 콘텐츠를 만나보세요!",
                cardBg: "bg-[#EEF2FF]", accent: "text-indigo-600", border: "border-indigo-400"
            },
            {
                id: 2, month: "5", title: "준비 중입니다", issue: "Vol. 2",
                status: "upcoming", thumbnail: "100.png",
                description: "5월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200"
            },
            {
                id: 3, month: "7", title: "준비 중입니다", issue: "Vol. 3",
                status: "upcoming", thumbnail: "100.png",
                description: "7월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200"
            },
            {
                id: 4, month: "9", title: "준비 중입니다", issue: "Vol. 4",
                status: "upcoming", thumbnail: "100.png",
                description: "9월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200"
            },
            {
                id: 5, month: "11", title: "준비 중입니다", issue: "Vol. 5",
                status: "upcoming", thumbnail: "100.png",
                description: "11월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200"
            },
            {
                id: 6, month: "12", title: "준비 중입니다", issue: "Vol. 6",
                status: "upcoming", thumbnail: "100.png",
                description: "12월호 웹진은 현재 열심히 제작 중입니다. 조금만 기다려주세요!",
                cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200"
            }
        ];

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [showModal, setShowModal] = useState(false);

            const filteredWebzines = WEBZINE_DATA.filter(w => 
                w.title.includes(searchTerm) || w.month.includes(searchTerm)
            );

            const handleSoon = (e) => {
                e.preventDefault();
                setShowModal(true);
            };

            return (
                <div className="min-h-screen flex flex-col items-center">
                    {/* PC용 커스텀 팝업 */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setShowModal(false)}></div>
                            <div className="relative bg-white rounded-[2.5rem] p-12 shadow-2xl max-w-sm w-full text-center border-4 border-indigo-100 modal-enter">
                                <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-600">
                                    <Icon name="clock" size={48} />
                                </div>
                                <h4 className="text-2xl text-slate-800 mb-3 font-bold">잠시만요! 😊</h4>
                                <p className="text-slate-500 mb-8 text-lg leading-relaxed">
                                    3월호 웹진은 현재 <br/>
                                    <span className="text-indigo-600 font-bold underline text-xl">곧 공개될 예정입니다.</span><br/>
                                    조금만 더 기다려주세요!
                                </p>
                                <button onClick={() => setShowModal(false)} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all active:scale-95 shadow-lg">확인했습니다</button>
                            </div>
                        </div>
                    )}

                    {/* 상단 배너 */}
                    <div className="w-full bg-indigo-600 text-white py-2 text-center text-sm font-medium tracking-wider">
                        🚀 서울고용센터와 함께하는 청년들의 무한한 성장판!
                    </div>

                    {/* HERO SECTION (PC 레이아웃) */}
                    <header className="w-full bg-white border-b border-orange-100 pt-16 pb-24 px-12 overflow-hidden">
                        <div className="max-w-6xl mx-auto flex items-center justify-between gap-12">
                            <div className="flex-1 text-left">
                                <div className="inline-flex items-center gap-2 bg-yellow-400 text-slate-900 px-5 py-2.5 rounded-full mb-8 font-bold border border-yellow-500/20 shadow-sm">
                                    <Icon name="smile" size={24} className="text-indigo-700" />
                                    <span>청년의 꿈과 가능성을 연결하는 취업 지원 허브, ✨서울고용센터✨</span>
                                </div>
                                <h1 className="text-7xl font-normal text-slate-900 mb-8 leading-[1.1]">
                                    청년 <span className="text-indigo-600 underline decoration-indigo-200 decoration-8 underline-offset-8 italic uppercase">ON-AIR</span><br />
                                    <span className="text-5xl">웹진 아카이브</span>
                                </h1>
                                <p className="text-slate-600 text-xl max-w-xl mb-12 leading-relaxed">
                                    서툰 첫걸음이 단단한 도약이 되기까지,<br/> 
                                    서울고용센터가 청년들과 함께 일궈낸 소중한 조각들을<br/> 
                                    <span className="text-indigo-600 font-bold">'청년ON-AIR'</span>에서 확인하세요. ✨
                                </p>
                                <div className="relative max-w-md group">
                                    <Icon name="search" size={24} className="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400" />
                                    <input 
                                        type="text" 
                                        placeholder="보고 싶은 월호 검색 (예: 3월)" 
                                        className="w-full pl-14 pr-8 py-5 bg-slate-50 border-4 border-orange-50 rounded-3xl text-lg focus:outline-none focus:border-indigo-400 transition-all shadow-lg placeholder:text-slate-300"
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="hidden lg:block relative w-96 shrink-0">
                                <div className="absolute -top-10 -left-6 bg-white p-4 rounded-2xl shadow-xl border-2 border-indigo-50 transform -rotate-12 z-20 text-indigo-600 font-bold text-sm text-center">
                                    서울고용센터 소식 <br/> 제가 다 들고 왔어요! 🎤
                                </div>
                                <img src="300.png" alt="리포터" className="w-full h-auto drop-shadow-2xl" />
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT (PC 3열 그리드) */}
                    <main className="max-w-6xl w-full px-8 -mt-12 relative z-20 pb-40">
                        <div className="grid grid-cols-3 gap-10 mb-20">
                            {filteredWebzines.map((webzine) => {
                                const isPublished = webzine.status === 'published';
                                return (
                                    <div key={webzine.id} className={`flex flex-col ${webzine.cardBg} rounded-[2.5rem] transition-all duration-500 border-4 ${isPublished ? `border-indigo-400 shadow-2xl scale-105 z-10` : `border-dashed border-slate-200 opacity-80 grayscale-[0.2]`}`}>
                                        <div className={`relative h-56 flex items-center justify-center ${isPublished ? 'bg-white/60' : 'bg-transparent'} p-6`}>
                                            <img src={webzine.thumbnail} alt={webzine.month} className="h-full w-auto object-contain transition-transform duration-700 group-hover:scale-110" />
                                            <div className="absolute top-4 left-4 bg-white/80 px-4 py-1.5 rounded-full border border-white/50 text-lg font-bold text-slate-800 shadow-sm">{webzine.issue}</div>
                                            
                                            {isPublished ? (
                                                /* OPEN 배지 잘림 방지 수정 */
                                                <div className="absolute top-4 right-4 z-30">
                                                    <div className="bg-yellow-400 text-slate-900 px-5 py-1.5 rounded-full text-xs font-black shadow-lg border-2 border-white/40 animate-pulse uppercase tracking-wider">OPEN</div>
                                                </div>
                                            ) : (
                                                <div className="absolute bottom-4 right-4 z-20"><div className="bg-white shadow-sm text-slate-400 px-3 py-1 rounded-lg text-xs font-black flex items-center gap-1.5 border border-white/50"><Icon name="clock" size={14} />공개 예정</div></div>
                                            )}
                                        </div>
                                        <div className="p-10 flex flex-col flex-grow text-center">
                                            <div className={`flex items-center justify-center gap-2 ${webzine.accent} mb-3 font-bold text-xl`}><Icon name="mapPin" size={20} /><span>{webzine.month}월호 웹진</span></div>
                                            <h2 className={`text-2xl font-normal mb-4 leading-tight ${isPublished ? 'text-slate-800' : 'text-slate-400'}`}>{webzine.title}</h2>
                                            <p className={`text-base ${isPublished ? 'text-slate-600' : 'text-slate-400'} leading-relaxed mb-10 line-clamp-3`}>{webzine.description}</p>
                                            <div className="mt-auto flex flex-col gap-3">
                                                {isPublished ? (
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <button onClick={handleSoon} className="bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-md">보기</button>
                                                        <button onClick={handleSoon} className="bg-white border-2 border-indigo-200 text-indigo-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-sm">PDF</button>
                                                    </div>
                                                ) : (
                                                    <div className="w-full bg-slate-100 text-slate-300 py-4 rounded-2xl font-bold text-lg border-2 border-dashed border-slate-200">Coming Soon</div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* --- 2025년 섹션: 번외편 스타일 (PC 가로 바 형태) --- */}
                        <div className="max-w-4xl mx-auto bg-white/60 rounded-[3rem] border-2 border-amber-200 border-dashed p-8 flex items-center justify-between gap-10 shadow-sm">
                           <div className="flex items-center gap-6 text-left">
                              <div className="shrink-0 w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-amber-500 shadow-sm">
                                <Icon name="sparkles" size={32} />
                              </div>
                              <div>
                                <span className="text-amber-600 font-bold text-sm uppercase tracking-widest block mb-1">Special Archive</span>
                                <h2 className="text-2xl text-slate-800 leading-tight">지난 발자취, 2025년 청년 ON-Lounge 다시보기</h2>
                              </div>
                           </div>
                           <div className="flex gap-3 shrink-0">
                                <a href="https://heyzine.com/flip-book/e5912678f9.html?fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGn0WwSh8y8ViyC5EE5WceaGH4rXK8VWEAXedkBm3y3IsZv7I9wFUxL1gI5fAU_aem_onNWGcgHiF6eRrRe8kKI9A" target="_blank" rel="noopener noreferrer" className="bg-amber-400 text-slate-900 px-8 py-4 rounded-2xl font-bold text-lg hover:bg-amber-500 transition-all flex items-center gap-2 border-none">
                                    <Icon name="layoutGrid" size={20} /> 웹진 보기
                                </a>
                                <a href="https://drive.google.com/file/d/1-7UAe9KPnu4hHH_ICMLe-GtsPuou9dAz/view?usp=sharing" target="_blank" rel="noopener noreferrer" className="bg-white text-amber-600 border-2 border-amber-200 px-8 py-4 rounded-2xl font-bold text-lg hover:bg-amber-50 transition-all flex items-center gap-2">
                                    <Icon name="download" size={20} /> PDF 받기
                                </a>
                           </div>
                        </div>
                    </main>

                    {/* FOOTER (PC 중앙 정렬) */}
                    <footer className="w-full bg-white border-t-8 border-yellow-400 pt-24 pb-12 px-8 flex flex-col items-center">
                        <div className="flex items-center gap-4 mb-8 text-center justify-center">
                            <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl rotate-6 shrink-0 border-none text-white"><Icon name="fileText" size={32} /></div>
                            <div className="text-left leading-none uppercase text-indigo-600">
                                <span className="text-3xl font-normal block tracking-tight">서울고용센터 웹진 아카이브</span>
                                <span className="text-slate-400 text-sm font-bold tracking-widest block mt-1">YOUTH ON-AIR STUDIO</span>
                            </div>
                        </div>
                        <p className="text-slate-500 max-w-lg mb-20 text-lg text-center leading-relaxed">이곳은 서울고용센터와 청년들이 함께 만들어가는 <br/>꿈과 도전의 기록 저장소입니다. 우리의 내일을 응원해요!</p>
                        
                        <div className="flex items-start justify-center gap-20 w-full max-w-5xl mb-24">
                            <div className="relative w-64 shrink-0">
                               <div className="absolute -top-24 left-1/2 -translate-x-1/2 bg-white px-5 py-3 rounded-2xl shadow-2xl border-2 border-indigo-50 animate-bounce text-indigo-600 font-bold text-sm whitespace-nowrap text-center">
                                  청년의 꿈을 이뤄주는 <br/> 서울고용센터에 오세요 ✨
                                  <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-b-2 border-r-2 border-indigo-50 rotate-45"></div>
                               </div>
                               <img src="300.png" alt="캐릭터" className="w-full h-auto drop-shadow-2xl" />
                            </div>
                            <div className="flex-grow max-w-md">
                                <div className="bg-[#FAF8F2] p-2 rounded-[2.5rem] mb-6 border border-orange-100 shadow-inner">
                                    <div className="rounded-[2rem] overflow-hidden border-4 border-white h-72 shadow-md bg-slate-200">
                                        <iframe title="지도" width="100%" height="100%" frameBorder="0" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.51866415053!2d126.98687797636183!3d37.56641262413551!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2e652a2022b%3A0xe5f9227f67713437!2z7ISc7Jq47Yq567OE7IucIOykkOq1rCDsgrzvOTrj6TrnoQgMzYz!5e0!3m2!1sko!2skr!4v1711514000000!5m2!1sko!2skr" allowFullScreen></iframe>
                                    </div>
                                </div>
                                <a href="https://map.naver.com/p/directions/-/3zi2Hl,2AM4KL,%EC%84%9C%EC%9A%B8%EA%B3%A0%EC%9A%A9%EB%B3%B5%EC%A7%80%ED%94%8C%EB%9F%AC%EC%8A%A4%EC%84%BC%ED%84%B0,1845904326,PLACE_POI/-/car?c=15.00,0,0,0,dh" target="_blank" rel="noopener noreferrer" className="bg-[#03C75A] text-white px-8 py-4 rounded-2xl font-bold text-xl hover:bg-[#02b351] transition-all flex items-center justify-center gap-2 border-none shadow-lg">
                                    <Icon name="navigation" size={20} /> 네이버 지도 길찾기
                                </a>
                            </div>
                        </div>

                        <div className="flex justify-center gap-6 mb-16 font-bold">
                            <a href="https://www.work.go.kr/seoul/main.do" target="_blank" className="px-8 py-3 bg-white text-indigo-600 rounded-full border border-orange-100 hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Icon name="globe" className="inline mr-2" /> 홈페이지</a>
                            <a href="https://www.work24.go.kr/cm/main.do" target="_blank" className="px-8 py-3 bg-white text-indigo-600 rounded-full border border-orange-100 hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Icon name="layoutGrid" className="inline mr-2" /> 고용24</a>
                            <a href="https://www.instagram.com/moel_seoulew/" target="_blank" className="px-8 py-3 bg-white text-indigo-600 rounded-full border border-orange-100 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">인스타그램</a>
                        </div>

                        <div className="w-full pt-12 border-t border-slate-100 flex flex-col items-center gap-8 border-none">
                            <div className="flex gap-16 items-center">
                                <img src="서울지방고용노동청 로고 (1).png" alt="노동청" className="h-10 w-auto" />
                                <img src="서울고용복지플러스센터 bi.png" alt="센터" className="h-10 w-auto" />
                            </div>
                            <p className="text-slate-400 text-xs uppercase tracking-widest">© 2026 Seoul Employment Center. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
